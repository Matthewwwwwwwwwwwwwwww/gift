<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение на корпоратив</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="stars-container"></div>

    <div class="card-wrapper">
        
        <div class="card-bounce">
            <div class="card" data-tilt data-tilt-glare data-tilt-max-glare="0.3" data-tilt-max="8" data-tilt-speed="400">
                
                <div class="cake-container">
                    <div class="glow-effect"></div>
                    <img src="cake.png" alt="Приглашение" class="card-img">
                </div>
                
                <div class="card-content">
                    <h2>Уважаемый Александр!</h2>
                    <p>Пусть этот год станет годом ярких побед, больших возможностей, приятных открытий и счастливых моментов.
                        А начало ему предлагаем положить в хорошей компании.
                    </p>
                    <div class="details">
                        <span>Санаторий «Саялы»</span>
                        <span>5 июля 12:00</span>
                    </div>
                </div>
            </div>
        </div>
        
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
